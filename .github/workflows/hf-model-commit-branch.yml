
name: HuggingFace Model Publish commit with branch

on:
  push:
    branches:
      - 'master'
    paths:
      - DALL-E
      - .github/workflows/hf-model-commit-branch.yml
  workflow_dispatch:
    inputs:
      commit_id:
        description: dall-e commit id(like 'master' '5be4b236')
        required: true
        default: master

jobs:
  download-and-push-hf-model:
    name: Download models and push to HuggingFace
    runs-on: ubuntu-latest

    strategy:
      matrix:
        BRANCH_CHECKOUT:
          - ${{ github.event.inputs.commit_id || 'master' }}

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install pip dependencies
        uses: BSFishy/pip-action@v1
        with:
          packages: |
            wget==3.2

      - name: Make models directory
        run: mkdir -p ./cache/models

      - name: Download models by wget
        working-directory: ./cache/models
        run: |
          python -m wget https://cdn.openai.com/dall-e/encoder.pkl -o ./encoder.pkl
          python -m wget https://cdn.openai.com/dall-e/decoder.pkl -o ./decoder.pkl

      - name: Install huggingface cli
        uses: BSFishy/pip-action@v1
        with:
          packages: huggingface_hub[cli]
          extra: --user

      - name: Log in to Hugging Face CLI
        run: hf auth login --token ${{ secrets.HF_TOKEN }}

      - name: Upload models to Hugging Face Models
        run: |
          hf upload --repo-type model --revision master ${{ secrets.HF_USERNAME }}/dall-e ./cache/models

      - name: Log out from Hugging Face CLI
        if: always()
        run: hf auth logout
